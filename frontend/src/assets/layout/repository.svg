<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges" fill="#1a2f5c">
  <!-- pixel book: thick spine left, pages right -->
  <rect x="2" y="2" width="4" height="20"/>
  <rect x="6" y="2" width="2" height="20"/>
  <!-- page border -->
  <rect x="8" y="2" width="14" height="2"/>
  <rect x="8" y="20" width="14" height="2"/>
  <rect x="20" y="4" width="2" height="16"/>
  <!-- text lines on page -->
  <rect x="10" y="7" width="8" height="2"/>
  <rect x="10" y="12" width="8" height="2"/>
  <rect x="10" y="17" width="5" height="2"/>
</svg>
