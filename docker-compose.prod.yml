services:
  api:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DOCS_DIR: /app/docs
      ROOT_PATH: /api
    volumes:
      - ./backend/docs:/app/docs:ro
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - doq

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - doq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_TITLE: ${VITE_TITLE:-DoQ}
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_VOLC_APPID: ${VITE_VOLC_APPID:-}
        VITE_VOLC_ACCESS_KEY: ${VITE_VOLC_ACCESS_KEY:-}
    restart: unless-stopped
    networks:
      - doq

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    networks:
      - doq

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  doq:
    driver: bridge
